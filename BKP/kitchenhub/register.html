<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>document.documentElement.setAttribute("data-theme",localStorage.getItem("kh_theme")||"dark")</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register – KitchenHub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>">
<link rel="stylesheet" href="css/style.css">
<style>
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(140deg,#050C1A 0%,#0F1C32 55%,#152240 100%);padding:24px 16px;position:relative;overflow:hidden}
.auth-page::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 70% 40%,rgba(255,107,53,.10) 0%,transparent 65%),radial-gradient(ellipse 40% 50% at 20% 80%,rgba(34,197,94,.06) 0%,transparent 60%);pointer-events:none}
.auth-card{background:var(--surf);border-radius:var(--r-xl);padding:36px 32px;width:100%;max-width:440px;box-shadow:var(--sh-xl);border:1px solid var(--bdr);position:relative;z-index:1;animation:fadeUp .5s var(--ease) both}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo-icon{width:52px;height:52px;background:var(--primary);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 10px}
.auth-logo-text{font-family:var(--ff-head);font-weight:800;font-size:1.3rem;color:var(--tx-1)}
.auth-logo-text span{color:var(--primary)}
.auth-tabs{display:flex;border-radius:var(--r-pill);background:var(--surf-2);padding:4px;margin-bottom:24px;gap:4px}
.auth-tab{flex:1;padding:9px;border-radius:var(--r-pill);font-size:.86rem;font-weight:600;color:var(--tx-2);background:transparent;cursor:pointer;transition:all var(--t) var(--ease);text-align:center;border:none;font-family:inherit}
.auth-tab.active{background:var(--surf);color:var(--tx-1);box-shadow:var(--sh-sm)}
.auth-form{display:flex;flex-direction:column;gap:13px}
.auth-input-group{display:flex;flex-direction:column;gap:5px}
.auth-label{font-size:.80rem;font-weight:600;color:var(--tx-2)}
.auth-input{padding:11px 14px;border:1.5px solid var(--bdr);border-radius:var(--r);font-size:.88rem;outline:none;background:var(--surf-2);color:var(--tx-1);transition:all var(--t) var(--ease);width:100%}
.auth-input:focus{border-color:var(--primary);background:var(--surf)}
.auth-input::placeholder{color:var(--tx-3)}
.auth-divider{display:flex;align-items:center;gap:12px;margin:4px 0;color:var(--tx-3);font-size:.80rem}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--bdr)}
.social-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.social-btn-auth{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;border:1.5px solid var(--bdr);border-radius:var(--r);font-size:.84rem;font-weight:600;color:var(--tx-1);background:var(--surf-2);cursor:pointer;transition:all var(--t) var(--ease);font-family:inherit}
.social-btn-auth:hover{border-color:var(--primary);color:var(--primary);background:rgba(255,107,53,.07)}
.pass-wrap{position:relative}
.pass-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--tx-3);cursor:pointer;font-size:.88rem;background:none;border:none;padding:0}
.forgot{font-size:.78rem;color:var(--primary);font-weight:600;text-align:right;display:block;margin-top:-4px}
.forgot:hover{text-decoration:underline}
.terms-note{font-size:.76rem;color:var(--tx-3);text-align:center;line-height:1.5}
.terms-note a{color:var(--primary)}
@media(max-width:480px){.auth-card{padding:28px 20px}.social-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <a href="index.html"><div class="auth-logo-icon">🍳</div></a>
      <div class="auth-logo-text">Kitchen<span>Hub</span></div>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabSignIn" onclick="switchAuth('signin')">Sign In</button>
      <button class="auth-tab" id="tabRegister" onclick="switchAuth('register')">Create Account</button>
    </div>

    <!-- SIGN IN FORM -->
    <div id="formSignIn">
      <div style="margin-bottom:18px;text-align:center">
        <div style="font-family:var(--ff-head);font-size:1.25rem;font-weight:800;color:var(--tx-1)">Welcome back</div>
        <div style="font-size:.84rem;color:var(--tx-2);margin-top:4px">Sign in to your KitchenHub account</div>
      </div>

      <!-- Social -->
      <div class="social-grid" style="margin-bottom:14px">
        <button class="social-btn-auth" onclick="socialLogin('Google')">
          <span style="font-size:1rem">G</span> Google
        </button>
        <button class="social-btn-auth" onclick="socialLogin('Facebook')">
          <span style="font-size:1rem">f</span> Facebook
        </button>
      </div>
      <div class="auth-divider">or continue with email</div>

      <div class="auth-form" style="margin-top:14px">
        <div class="auth-input-group">
          <label class="auth-label">Email Address</label>
          <input class="auth-input" type="email" placeholder="your@email.com" id="siEmail">
        </div>
        <div class="auth-input-group">
          <label class="auth-label">Password</label>
          <div class="pass-wrap">
            <input class="auth-input" type="password" placeholder="••••••••" id="siPass">
            <button class="pass-toggle" onclick="togglePass('siPass',this)">👁</button>
          </div>
          <a href="#" class="forgot">Forgot password?</a>
        </div>
        <div style="display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--tx-2)">
          <input type="checkbox" id="rememberMe" checked style="accent-color:var(--primary);width:15px;height:15px">
          <label for="rememberMe">Remember me for 30 days</label>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;font-size:.92rem" onclick="handleSignIn()">Sign In →</button>
      </div>

      <div style="text-align:center;margin-top:16px;font-size:.82rem;color:var(--tx-2)">
        Don't have an account? <a href="#" onclick="switchAuth('register')" style="color:var(--primary);font-weight:600">Create one free →</a>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="formRegister" style="display:none">
      <div style="margin-bottom:18px;text-align:center">
        <div style="font-family:var(--ff-head);font-size:1.25rem;font-weight:800;color:var(--tx-1)">Create your account</div>
        <div style="font-size:.84rem;color:var(--tx-2);margin-top:4px">Join 10,000+ happy KitchenHub shoppers</div>
      </div>

      <div class="social-grid" style="margin-bottom:14px">
        <button class="social-btn-auth" onclick="socialLogin('Google')"><span style="font-size:1rem">G</span> Google</button>
        <button class="social-btn-auth" onclick="socialLogin('Facebook')"><span style="font-size:1rem">f</span> Facebook</button>
      </div>
      <div class="auth-divider">or sign up with email</div>

      <div class="auth-form" style="margin-top:14px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="auth-input-group"><label class="auth-label">First Name</label><input class="auth-input" type="text" placeholder="Jane" id="regFirst"></div>
          <div class="auth-input-group"><label class="auth-label">Last Name</label><input class="auth-input" type="text" placeholder="Wanjiku" id="regLast"></div>
        </div>
        <div class="auth-input-group">
          <label class="auth-label">Email Address</label>
          <input class="auth-input" type="email" placeholder="your@email.com" id="regEmail">
        </div>
        <div class="auth-input-group">
          <label class="auth-label">Phone Number</label>
          <input class="auth-input" type="tel" placeholder="+254 700 000 000" id="regPhone">
        </div>
        <div class="auth-input-group">
          <label class="auth-label">Password</label>
          <div class="pass-wrap">
            <input class="auth-input" type="password" placeholder="Min 8 characters" id="regPass">
            <button class="pass-toggle" onclick="togglePass('regPass',this)">👁</button>
          </div>
        </div>
        <div class="auth-input-group">
          <label class="auth-label">Confirm Password</label>
          <div class="pass-wrap">
            <input class="auth-input" type="password" placeholder="Repeat password" id="regPass2">
            <button class="pass-toggle" onclick="togglePass('regPass2',this)">👁</button>
          </div>
        </div>
        <div style="display:flex;align-items:flex-start;gap:8px;font-size:.80rem;color:var(--tx-2)">
          <input type="checkbox" id="agreeTerms" style="accent-color:var(--primary);width:15px;height:15px;flex-shrink:0;margin-top:2px">
          <label for="agreeTerms">I agree to the <a href="#" style="color:var(--primary)">Terms of Service</a> and <a href="#" style="color:var(--primary)">Privacy Policy</a></label>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;font-size:.92rem" onclick="handleRegister()">Create Account →</button>
      </div>

      <div style="text-align:center;margin-top:16px;font-size:.82rem;color:var(--tx-2)">
        Already have an account? <a href="#" onclick="switchAuth('signin')" style="color:var(--primary);font-weight:600">Sign in →</a>
      </div>
    </div>

    <!-- Back link -->
    <div style="text-align:center;margin-top:20px">
      <a href="index.html" style="font-size:.78rem;color:var(--tx-3)">← Back to KitchenHub</a>
    </div>

  </div>
</div>

<script src="js/app.js"></script>
<script>
function switchAuth(mode){
  const si = mode==='signin';
  document.getElementById('formSignIn').style.display   = si ? 'block' : 'none';
  document.getElementById('formRegister').style.display = si ? 'none'  : 'block';
  document.getElementById('tabSignIn').classList.toggle('active', si);
  document.getElementById('tabRegister').classList.toggle('active', !si);
  document.title = si ? 'Sign In – KitchenHub' : 'Register – KitchenHub';
}

function togglePass(id, btn){
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.innerHTML = show ? '🙈' : '👁';
}

function socialLogin(provider){
  toast(`Redirecting to ${provider}…`, 'info');
  setTimeout(()=>window.location.href='index.html', 1400);
}

function handleSignIn(){
  const email = document.getElementById('siEmail').value.trim();
  const pass  = document.getElementById('siPass').value.trim();
  if(!email || !pass){ toast('Please fill in all fields', 'error'); return; }
  if(!email.includes('@')){ toast('Please enter a valid email', 'error'); return; }
  toast('Signing you in…', 'info');
  setTimeout(()=>window.location.href='index.html', 1200);
}

function handleRegister(){
  const first = document.getElementById('regFirst').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value.trim();
  const pass2 = document.getElementById('regPass2').value.trim();
  const terms = document.getElementById('agreeTerms').checked;
  if(!first || !email || !pass){ toast('Please fill in all required fields', 'error'); return; }
  if(pass !== pass2){ toast('Passwords do not match', 'error'); return; }
  if(pass.length < 8){ toast('Password must be at least 8 characters', 'error'); return; }
  if(!terms){ toast('Please accept the Terms of Service', 'error'); return; }
  toast('Account created! Welcome to KitchenHub 🎉', 'success');
  setTimeout(()=>window.location.href='index.html', 1400);
}

// Check URL param for mode
const mode = new URLSearchParams(window.location.search).get('mode');
if(mode==='register') switchAuth('register');
</script>
</body>
</html>
